# Server configuration
server.port=${SERVER_PORT:8080}

# Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/laptop_shop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger/OpenAPI configuration
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs

# Custom properties
app.import.path=${APP_IMPORT_PATH:../laptop_data/final_gallery_data.json}
app.import.enabled=true
app.jwt.secret=${JWT_SECRET:dev_secret_key_change_me}
app.jwt.expiration=${JWT_EXPIRATION:3600000}
app.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# CORS configuration
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Mail Configuration
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google OAuth2 Configuration
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}

# Frontend Redirect URI
app.oauth2.redirect-uri=${FRONTEND_URL:http://localhost:3000}/oauth2/redirect

# Logging
logging.level.org.springframework.security=DEBUG

# Admin Configuration
app.admin.email=${ADMIN_EMAIL:admin@gmail.com}
app.admin.password=${ADMIN_PASSWORD:admin}
app.admin.full-name=${ADMIN_FULLNAME:Admin}

# VNPAY Configuration (Sandbox)
vnpay.tmn-code=${VNPAY_TMN_CODE:TC8H9799}
vnpay.hash-secret=${VNPAY_HASH_SECRET:SECRET_KEY}
vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay-callback}

# Momo Configuration (Sandbox)
momo.partner-code=${MOMO_PARTNER_CODE:MOMO}
momo.access-key=${MOMO_ACCESS_KEY:ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY:SECRET_KEY}
momo.url=${MOMO_URL:https://test-payment.momo.vn/v2/gateway/api/create}

# Payment Backend URL (for callbacks)
app.payment.backend-url=${PAYMENT_BACKEND_URL:http://localhost:8080}

# Zalopay Configuration (Sandbox)
zalopay.appid=${ZALOPAY_APPID:2553}
zalopay.key1=${ZALOPAY_KEY1:SECRET_KEY1}
zalopay.key2=${ZALOPAY_KEY2:SECRET_KEY2}
zalopay.url=${ZALOPAY_URL:https://sb-openapi.zalopay.vn/v2/create}

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY:}

# AI Configuration
app.ai.gemini.key=${GEMINI_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-1.5-flash-latest}